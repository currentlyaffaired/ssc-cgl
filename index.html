<!DOCTYPE html>
<html lang="en">
<head>

  <!-- META -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07090f">

  <title>Notes</title>

  <!-- STYLES -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- ICONS -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <link rel="manifest" href="manifest.json">

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

</head>

<body>

<!-- =========================
     HEADER
========================= -->
<div class="header">

  <!-- TOP ROW -->
  <div class="header-row">
    <div class="header-title">NOTES</div>

    <button class="bookmark-btn" onclick="showBookmarks()">
      <i data-lucide="star"></i>
    </button>
  </div>

  <!-- 🔍 SEARCH -->
  <div class="search-box">
    <i data-lucide="search"></i>
    <input id="search" placeholder="Search notes...">
  </div>

  <!-- SMART SUGGESTIONS -->
  <div class="search-suggestions"></div>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->
<div id="app"></div>

<!-- =========================
     BOOKMARK OVERLAY (GOD MODE)
========================= -->
<div class="bookmark-overlay hidden"></div>

<!-- =========================
     FLOATING NAV
========================= -->
<div class="bottom-nav">

  <!-- 💧 LIQUID INDICATOR -->
  <div class="nav-indicator"></div>

  <button onclick="setActive(this); loadSubject('biology')">
    <i data-lucide="dna"></i>
    <span>Bio</span>
  </button>

  <button onclick="setActive(this); loadSubject('chemistry')">
    <i data-lucide="flask-conical"></i>
    <span>Chem</span>
  </button>

  <button onclick="setActive(this); loadSubject('physics')">
    <i data-lucide="zap"></i>
    <span>Phy</span>
  </button>

  <button onclick="setActive(this); loadSubject('computers')">
    <i data-lucide="cpu"></i>
    <span>Comp</span>
  </button>

</div>

<!-- =========================
     DATA FILES
========================= -->
<script src="data/biology.js"></script>
<script src="data/chemistry.js"></script>
<script src="data/physics.js"></script>
<script src="data/computers.js"></script>

<!-- =========================
     APP LOGIC
========================= -->
<script src="app.js"></script>

<!-- =========================
     INIT ICONS
========================= -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (window.lucide) lucide.createIcons();
  });
</script>

</body>
</html>
